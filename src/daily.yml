name: Daily Stock Report

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 실행
  workflow_dispatch: # 이 구문이 있어야 Actions 탭에 'Run workflow' 버튼이 나타납니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # 코드를 체크아웃합니다.
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install # package.json의 의존성을 설치합니다.[cite: 4]
      - run: node src/index.js # 분석 스크립트를 실행합니다.[cite: 3]
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
